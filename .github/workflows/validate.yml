name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: scripts/validate-skills.sh
      - name: Test Ultra lens ownership
        run: bash tests/ultra-lenses.sh
      - name: Test Ultra canonical routing
        run: bash tests/ultra-canonical-routing.sh --contract
      - name: Test Ultra v1.1 catalog
        run: bash tests/ultra-v1-1-catalog.sh
      - name: Test Ultra solve boundaries
        run: bash tests/ultra-solve-boundaries.sh
      - name: Test Ultra solve eval harness
        run: bash tests/ultra-solve-eval-harness.sh
      - name: Test Maintainer Board
        run: bash tests/maintainer-board.sh
      - name: Test agent-worktree
        run: tests/agent-worktree.sh
