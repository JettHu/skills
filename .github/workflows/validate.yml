name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: scripts/validate-skills.sh
      - name: Test agent-worktree
        run: tests/agent-worktree.sh
